<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM VOXZY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060d19;
            --card-bg: #101929;
            --primary-blue: #3b82f6;
            --text-gray: #94a3b8;
            --neon-border: #1e293b;
            --verified-blue: #1d9bf0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* --- UPDATE BACKGROUND: WARNA HITAM ABU-ABU BRAY --- */
        body { 
            background-color: #1a1c20; /* Abu-abu gelap (Hitam Abu-abu) */
            color: white; 
            padding-bottom: 50px; 
            overflow-x: hidden; 
        }

        /* Navbar */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(11, 20, 38, 0.9); 
            border-bottom: 1px solid #1e293b; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(10px);
        }

        /* --- LOGO UPGRADE: TEBAL, MIRING, BESAR & ANIMASI DEWA --- */
        .logo { 
            font-family: 'Fira Code', monospace;
            font-size: 1.4rem; 
            font-weight: 900; 
            font-style: italic; 
            color: white;
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            animation: god-mode 3s ease-in-out infinite;
            padding-right: 10px; 
        }

        /* --- EFEK KILAT: SAMPAI POJOK GARIS 3 --- */
        nav::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            animation: scan-full 3.5s infinite;
            pointer-events: none;
        }

        @keyframes scan-full {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        /* --- MENU ICON: DITEBELIN BRAY --- */
        .menu-icon {
            font-size: 1.6rem;
            font-weight: 900; 
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        @keyframes god-mode {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-2px); filter: brightness(1.3); text-shadow: 0 0 20px var(--primary-blue); }
        }

        /* Banner Utama */
        .banner { padding: 0; position: relative; } 
        .banner-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-bottom: 1px solid #334155; 
            aspect-ratio: 16 / 9;
        }
        .banner-img { width: 100%; height: 100%; }
        .banner-img img { width: 100%; height: 100%; object-fit: cover; }

        /* VERIFIED DI ATAS TEKS BERJALAN */
        .verified-container {
            display: flex;
            justify-content: center;
            margin-top: -20px; 
            position: relative;
            z-index: 20;
            margin-bottom: 10px;
        }

        .watermark-verified {
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .wm-text { color: white; font-size: 0.85rem; font-weight: 700; }
        .wm-icon { width: 16px; height: 16px; fill: var(--verified-blue); }

        /* --- TEKS BERJALAN SUPER SMOOTH ANTI LAG --- */
        .running-text-container {
            width: 100%;
            background: rgba(11, 20, 38, 0.8);
            border-top: 1px solid #1e293b;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
            padding: 12px 0;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }

        .marquee-content {
            display: inline-flex;
            white-space: nowrap;
            will-change: transform;
            animation: marquee 15s linear infinite;
        }

        .marquee-content p {
            font-size: 0.85rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-right: 100px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px var(--primary-blue);
        }

        .highlight-blue { color: var(--primary-blue); }
        .highlight-green { color: #10b981; }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        /* --- SECTION GAME CHEAT POPULER (TEKS BARU) --- */
        .search-container { padding: 10px 20px 10px; }
        
        .title-section { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.1rem; 
            font-weight: 900; 
            font-style: italic; 
            margin-bottom: 15px;
            color: #fff;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 15px var(--primary-blue); transform: scale(1.02); color: var(--primary-blue); }
        }

        /* --- LIST GAME FILTER: TEBAL & MIRING --- */
        .filter-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 20px 20px;
            scrollbar-width: none;
        }
        .filter-container::-webkit-scrollbar { display: none; }

        .filter-item {
            background: rgba(16, 25, 41, 0.8);
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            white-space: nowrap;
            border: 1px solid #1e293b;
            transition: 0.3s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .filter-item.active {
            background: var(--primary-blue);
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* --- PRODUCT GRID UPGRADE: 3 KOLOM SEJAJAR --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            padding: 0 10px; 
        }

        /* --- STYLE KARTU PRODUK: UKURAN BESAR & TINGGI SESUAI CONTOH --- */
        .card {
            background: rgba(16, 25, 41, 0.85);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--neon-border);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: #000;
            overflow: hidden;
            padding: 5px; 
        }
        .card-img img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 8px;
        }
        
        .card-info { padding: 15px 10px; text-align: center; }
        .card-title {
            font-size: 0.65rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }
        .btn-beli {
            background: #1e293b;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.3s;
            border: 1px solid #334155;
            text-transform: uppercase;
        }
        .btn-beli:hover {
            background: var(--primary-blue);
            box-shadow: 0 0 15px var(--primary-blue);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">ADM VOXZY STORE</div>
        <div class="menu-icon">☰</div>
    </nav>

    <div class="banner">
        <div class="banner-wrapper">
            <div class="banner-img">
                <img src="img1.jpg" alt="Voxzy Store Banner">
            </div>
        </div>
    </div>

    <div class="verified-container">
        <div class="watermark-verified">
            <span class="wm-text">@voxzystore</span>
            <svg class="wm-icon" viewBox="0 0 24 24">
                <g><path d="M22.5 12.5c0-1.58-.8-2.95-2.02-3.76.42-1.61.08-3.34-1.11-4.53-1.19-1.19-2.91-1.53-4.52-1.11-.81-1.22-2.18-2.02-3.76-2.02s-2.95.8-3.76 2.02c-1.61-.42-3.34-.08-4.53 1.11-1.19 1.19-1.53 2.91-1.11 4.52-1.22.81-2.02 2.18-2.02 3.76s.8 2.02 3.76c-.42 1.61-.08 3.34 1.11 4.53 1.19 1.19 2.91 1.53 4.52 1.11.81 1.22 2.18 2.02 3.76 2.02s2.95-.8 3.76-2.02c1.61.42 3.34.08 4.53-1.11 1.19-1.19 1.53-2.91 1.11-4.52 1.22-.81 2.02-2.18 2.02-3.76zm-11.23 3.99l-4.3-4.3 1.41-1.41 2.89 2.89 7.18-7.18 1.41 1.41-8.59 8.59z"></path></g>
            </svg>
        </div>
    </div>

    <div class="running-text-container">
        <div class="marquee-content">
            <p><span class="highlight-blue">VOXZY STORE</span> WEBSITE CHEAT <span class="highlight-green">MURAH, AMAN DAN TERPERCAYA</span> OPEN 24 JAM !!!</p>
            <p><span class="highlight-blue">VOXZY STORE</span> WEBSITE CHEAT <span class="highlight-green">MURAH, AMAN DAN TERPERCAYA</span> OPEN 24 JAM !!!</p>
        </div>
    </div>

    <div class="search-container">
        <div class="title-section">🔥 GAME CHEAT POPULER</div>
    </div>

    <div class="filter-container">
        <div class="filter-item active" onclick="filterGame(this, 'all')">ALL</div>
        <div class="filter-item" onclick="filterGame(this, 'ff')">FREE FIRE</div>
        <div class="filter-item" onclick="filterGame(this, 'ml')">MOBILE LEGEND</div>
        <div class="filter-item" onclick="filterGame(this, 'bs')">BLOOD STRIKE</div>
        <div class="filter-item" onclick="filterGame(this, '8bp')">8 BALL POOL</div>
    </div>

    <div class="product-grid" id="productGrid">
        </div>

    <script>
        function filterGame(element, game) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            const grid = document.getElementById('productGrid');
            grid.innerHTML = ''; 

            if (game === 'ff' || game === 'all') {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img">
                            <img src="img_ff1.jpg" alt="DRIP CLIENT">
                        </div>
                        <div class="card-info">
                            <div class="card-title">DRIP CLIENT APKMOD</div>
                            <button class="btn-beli">🛒 BELI</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-img">
                            <img src="drip.jpg" alt="DRIP CLIENT">
                        </div>
                        <div class="card-info">
                            <div class="card-title">DRIP CLIENT ROOT</div>
                            <button class="btn-beli">🛒 BELI</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-img">
                            <img src="hg.jpg" alt="HG CHEATS">
                        </div>
                        <div class="card-info">
                            <div class="card-title">HG CHEATS NON ROOT</div>
                            <button class="btn-beli">🛒 BELI</button>
                        </div>
                    </div>
                `;
            }
        }
        
        filterGame(document.querySelector('.filter-item.active'), 'all');
    </script>

</body>
</html>
