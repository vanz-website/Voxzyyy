<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM VOXZY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060d19;
            --card-bg: #101929;
            --primary-blue: #3b82f6;
            --text-gray: #94a3b8;
            --neon-border: #1e293b;
            --verified-blue: #1d9bf0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: white; padding-bottom: 50px; overflow-x: hidden; }

        /* Navbar */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: #0b1426; 
            border-bottom: 1px solid #1e293b; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        /* --- LOGO UPGRADE: TEBAL, MIRING, BESAR & ANIMASI DEWA --- */
        .logo { 
            font-family: 'Fira Code', monospace;
            font-size: 1.4rem; 
            font-weight: 900; 
            font-style: italic; 
            color: white;
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            animation: god-mode 3s ease-in-out infinite;
            padding-right: 10px; /* Biar huruf E nggak kepotong bray */
        }

        /* --- EFEK KILAT: SAMPAI POJOK GARIS 3 --- */
        nav::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            animation: scan-full 3.5s infinite;
            pointer-events: none;
        }

        @keyframes scan-full {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        /* --- MENU ICON: DITEBELIN BRAY --- */
        .menu-icon {
            font-size: 1.6rem;
            font-weight: 900; 
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        @keyframes god-mode {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-2px); filter: brightness(1.3); text-shadow: 0 0 20px var(--primary-blue); }
        }

        /* Banner Utama - FIX: Padding dihapus biar pas garis teks berjalan */
        .banner { padding: 0; position: relative; } 
        .banner-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-bottom: 1px solid #334155; /* Garis pembatas tipis bray */
            aspect-ratio: 16 / 9;
        }
        .banner-img { width: 100%; height: 100%; }
        .banner-img img { width: 100%; height: 100%; object-fit: cover; }

        /* VERIFIED DI ATAS TEKS BERJALAN */
        .verified-container {
            display: flex;
            justify-content: center;
            margin-top: -20px; 
            position: relative;
            z-index: 20;
            margin-bottom: 10px;
        }

        .watermark-verified {
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .wm-text { color: white; font-size: 0.85rem; font-weight: 700; }
        .wm-icon { width: 16px; height: 16px; fill: var(--verified-blue); }

        /* --- TEKS BERJALAN SUPER SMOOTH ANTI LAG --- */
        .running-text-container {
            width: 100%;
            background: #0b1426;
            border-top: 1px solid #1e293b;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
            padding: 12px 0;
            margin-bottom: 10px;
        }

        .marquee-content {
            display: inline-flex;
            white-space: nowrap;
            will-change: transform;
            animation: marquee 15s linear infinite;
        }

        .marquee-content p {
            font-size: 0.85rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-right: 100px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px var(--primary-blue);
        }

        .highlight-blue { color: var(--primary-blue); }
        .highlight-green { color: #10b981; }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        /* --- SECTION GAME CHEAT POPULER (TEKS BARU) --- */
        .search-container { padding: 10px 20px 20px; }
        
        .title-section { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.1rem; 
            font-weight: 900; 
            font-style: italic; 
            margin-bottom: 5px;
            color: #fff;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 15px var(--primary-blue); transform: scale(1.02); color: var(--primary-blue); }
        }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">ADM VOXZY STORE</div>
        <div class="menu-icon">☰</div>
    </nav>

    <div class="banner">
        <div class="banner-wrapper">
            <div class="banner-img">
                <img src="img1.jpg" alt="Voxzy Store Banner">
            </div>
        </div>
    </div>

    <div class="verified-container">
        <div class="watermark-verified">
            <span class="wm-text">@voxzystore</span>
            <svg class="wm-icon" viewBox="0 0 24 24">

            </svg>
        </div>
    </div>

    <div class="running-text-container">
        <div class="marquee-content">
            <p><span class="highlight-blue">VOXZY STORE</span> WEBSITE CHEAT <span class="highlight-green">MURAH, AMAN DAN TERPERCAYA</span> OPEN 24 JAM !!!</p>
            <p><span class="highlight-blue">VOXZY STORE</span> WEBSITE CHEAT <span class="highlight-green">MURAH, AMAN DAN TERPERCAYA</span> OPEN 24 JAM !!!</p>
        </div>
    </div>

    <div class="search-container">
        <div class="title-section">🔥 GAME CHEAT POPULER</div>
    </div>

    <div class="product-grid">
    </div>

</body>
</html>
